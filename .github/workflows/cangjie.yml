name: Cangjie Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Cangjie SDK
        run: |
          wget "https://cangjie-lang.cn/v1/files/auth/downLoad?nsId=142267&fileName=cangjie-sdk-linux-x64-1.0.1.tar.gz&objectKey=68a67996d1b22272d50f15f2" -q -O cangjie-sdk.tar.gz
          tar -xzf cangjie-sdk.tar.gz

      - name: Build and Test
        run: |
          . cangjie/envsetup.sh
          cjc --version
          cjpm update
          cjpm build
          cjpm test
